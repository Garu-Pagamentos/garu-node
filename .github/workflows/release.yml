name: Release

# Publishes to npm on every push to `main`, but ONLY when the version in
# package.json isn't already on the registry. Ordinary commits (docs,
# refactors, CI changes) test-and-skip instead of failing on a duplicate
# version. To cut a release: bump `version` in package.json + update
# CHANGELOG.md, commit, and push to main.
#
# NOTE: npm Trusted Publishing (OIDC) is pinned to THIS workflow filename
# (release.yml). Keep publishing here — moving it to another workflow would
# require reconfiguring the npm trusted-publisher settings by hand.

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: Check whether this version is already published
        id: published
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION is already on npm — skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "$NAME@$VERSION is new — will test, build, and publish."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.published.outputs.skip == 'false'
        run: npm test

      - if: steps.published.outputs.skip == 'false'
        run: npm run build

      - name: Publish with provenance
        if: steps.published.outputs.skip == 'false'
        run: npm publish --access public --provenance
